<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fox Group Sync</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <h1>Fox Group Sync</h1>
        <p>Salve grupos nativos do Firefox e restaure em outro Firefox desktop logado na mesma conta Mozilla.</p>
      </header>

      <section class="notice" id="notice"></section>

      <section class="panel">
        <div class="panel-header">
          <h2>Grupos atuais</h2>
          <button id="btnRefresh" class="secondary">Atualizar</button>
        </div>
        <div id="currentGroups" class="list"></div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Workspaces salvos</h2>
          <div class="header-actions">
            <span class="hint">Sincronizados via <code>storage.sync</code></span>
            <span id="syncLoader" class="sync-loader" aria-hidden="true"></span>
            <button id="btnRefreshSaved" class="secondary">Atualizar sync</button>
            <button id="btnClearAll" class="danger">Limpar sync</button>
          </div>
        </div>
        <div id="syncStatus" class="sync-status"></div>
        <div id="savedWorkspaces" class="list"></div>
      </section>
    </main>

    <section id="updateConfirmModal" class="modal-backdrop" aria-hidden="true">
      <article class="modal-card" role="dialog" aria-modal="true" aria-labelledby="updateConfirmTitle">
        <h3 id="updateConfirmTitle">Confirmar atualização do grupo sincronizado</h3>
        <p id="updateConfirmMessage" class="modal-text"></p>
        <div class="diff-grid">
          <div class="diff-panel">
            <h4>Abas adicionadas</h4>
            <ul id="diffAddedList" class="diff-list added"></ul>
          </div>
          <div class="diff-panel">
            <h4>Abas removidas</h4>
            <ul id="diffRemovedList" class="diff-list removed"></ul>
          </div>
        </div>
        <label class="modal-checkbox">
          <input id="dontAskAgainCheckbox" type="checkbox" />
          Nao perguntar novamente para este grupo (nome + cor)
        </label>
        <div class="modal-actions">
          <button id="cancelUpdateBtn" class="secondary" type="button">Cancelar</button>
          <button id="confirmUpdateBtn" type="button">Atualizar grupo</button>
        </div>
      </article>
    </section>

    <script src="popup.js"></script>
  </body>
</html>
